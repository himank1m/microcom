<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 150" role="img" aria-labelledby="title desc">
  <title id="title">Microware Communications logo</title>
  <desc id="desc">Microware Communications wordmark with Wi-Fi symbol and Look No Further slogan.</desc>
  <defs>
    <linearGradient id="silver" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f8fa" />
      <stop offset="0.5" stop-color="#b8c0ca" />
      <stop offset="1" stop-color="#6f7782" />
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff9a1f" />
      <stop offset="1" stop-color="#f05a00" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="520" height="150" rx="18" fill="#070707" />
  <path d="M21 117 C95 136 191 135 259 118 C341 98 432 101 499 119" fill="none" stroke="url(#silver)" stroke-width="2" opacity="0.7" />
  <path d="M23 125 C108 142 204 139 275 123 C350 105 429 108 497 126" fill="none" stroke="url(#orange)" stroke-width="3" stroke-linecap="round" opacity="0.95" />

  <g filter="url(#shadow)">
    <path d="M222 30 C243 13 276 13 298 30" fill="none" stroke="url(#orange)" stroke-width="8" stroke-linecap="round" />
    <path d="M235 44 C249 33 270 33 284 44" fill="none" stroke="#c9d0d8" stroke-width="7" stroke-linecap="round" />
    <circle cx="260" cy="58" r="7" fill="url(#orange)" />
  </g>

  <text
    x="260"
    y="85"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="48"
    font-weight="800"
    letter-spacing="-1"
  >
    <tspan fill="url(#silver)">Micro</tspan><tspan fill="url(#orange)">ware</tspan>
  </text>
  <text
    x="260"
    y="106"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="16"
    font-weight="700"
    letter-spacing="4"
    fill="#d8dde3"
  >
    COMMUNICATIONS
  </text>
  <text
    x="260"
    y="132"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    font-style="italic"
    font-weight="700"
    fill="#ff7a00"
  >
    Look No Further
  </text>
</svg>
